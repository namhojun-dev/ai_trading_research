name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Smoke Test
        run: |
          npm run start -- --hostname 0.0.0.0 --port 3100 > /tmp/next.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3100 >/dev/null; then
              npm run test:kfin
              exit 0
            fi
            sleep 1
          done
          cat /tmp/next.log
          exit 1
